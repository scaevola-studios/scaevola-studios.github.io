<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Scaevola Studios | Home</title>
	<link href="bootstrap.min.css" rel="stylesheet">
	<link href="site.css" rel="stylesheet">
	<script src="marked.min.js"></script>
	<script src="navbar.js"></script>
	<script src="home.js"></script>
</head>

<body class="bg-light min-vh-100 d-flex flex-column">
	<div id="navbar-container"></div>
	<main class="flex-grow-1 container my-5">
		<div id="content">Loading...</div>
	</main>

	<footer class="bg-dark text-light py-4 mt-auto">
		<div class="container text-center">
			<p>&copy; <span id="copyrightYear"></span> Scaevola Studios. All rights reserved.</p>
		</div>
	</footer>

	<script>
		document.getElementById("copyrightYear").innerText = new Date().getFullYear();

		if (document.readyState === 'loading') {
			document.addEventListener('DOMContentLoaded', nav);
		} else {
			nav();
		}

		function evaluateWindowLocationHash(event) {
			const pageName = window.location.hash
				? window.location.hash.substring(1)
				: 'home';

			if (pageName === 'home')
				home();
			else if (pageName.endsWith('md'))
				navPostFromFileName(pageName);
			else
				navPage(`${pageName}.html`);
		}

		addEventListener("hashchange", (event) =>
			evaluateWindowLocationHash(event));

		// Initialize by loading hash change
		evaluateWindowLocationHash();
	</script>

</body>

</html>
