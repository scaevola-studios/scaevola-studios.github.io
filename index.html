<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Scaevola Studios | Home</title>
	<link href="bootstrap.min.css" rel="stylesheet">
	<link href="site.css" rel="stylesheet">
	<script src="marked.min.js"></script>
	<script src="navbar.js"></script>
	<script src="home.js"></script>
</head>

<body class="bg-light">
	<div id="navbar-container"></div>
	<div class="container my-5">
		<div id="content">Loading...</div>
	</div>

	<script>
		if (document.readyState === 'loading') {
			document.addEventListener('DOMContentLoaded', nav);
		} else {
			nav();
		}

		function evaluateWindowLocationHash(event) {
			const pageName = window.location.hash
				? window.location.hash.substring(1)
				: 'home';

			if (pageName === 'home')
				home();
			else if (pageName.endsWith('md'))
				navPostFromFileName(pageName);
			else
				navPage(`${pageName}.html`);
		}

		addEventListener("hashchange", (event) =>
			evaluateWindowLocationHash(event));

		// Initialize by loading hash change
		evaluateWindowLocationHash();
	</script>

</body>

</html>
